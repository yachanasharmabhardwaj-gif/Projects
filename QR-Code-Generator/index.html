<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="QR Code Favicon.png" type="image/x-icon">
</head>
<body>
    <h2 class="hide"></h2>
    <div class="container">
        <p>Enter your Text or URL</p>
        <input type="text" placeholder="Type Text or URL" class="qrText" spellcheck="false">

        <div class="imgBox">
            <img src="" alt="" class="qrImage">
        </div>
        
        <button class="genraterQR">Generate QR Code</button>
    </div>

    <script src="srcipt.js"></script>
</body>
</html>
