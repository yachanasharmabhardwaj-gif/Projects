<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Clock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Analog Clock Favicon.png" type="image/x-icon">
</head>
<body>
    <div class="clock">
        <div class="num" style="--i:1;"><b>1</b></div>
        <div class="num" style="--i:2;"><b>2</b></div>
        <div class="num" style="--i:3;"><b>3</b></div>
        <div class="num" style="--i:4;"><b>4</b></div>
        <div class="num" style="--i:5;"><b>5</b></div>
        <div class="num" style="--i:6;"><b>6</b></div>
        <div class="num" style="--i:7;"><b>7</b></div>
        <div class="num" style="--i:8;"><b>8</b></div>
        <div class="num" style="--i:9;"><b>9</b></div>
        <div class="num" style="--i:10;"><b>10</b></div>
        <div class="num" style="--i:11;"><b>11</b></div>
        <div class="num" style="--i:12;"><b>12</b></div>

        <div class="hand" id="hour"><i></i></div>
        <div class="hand" id="min"><i></i></div>
        <div class="hand" id="sec"><i></i></div>
        
        <div class="dot"></div>

        <div id="digital-clock">
            <div id="time">00:00:00 AM</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
