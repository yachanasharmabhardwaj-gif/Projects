<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Coming Soon Page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/Favicon.png" type="image/x-icon">
</head>

<body>
    <div class="container">
        <img src="images/logo.png" class="logo" alt="Logo">

        <div class="content">
            <p>Our website is under construction</p>
            <h1>We're <span>Launching</span> Soon</h1>

            <div class="launch-time">
                <div class="time-box">
                    <p id="days">00</p>
                    <span>Days</span>
                </div>
                <div class="time-box">
                    <p id="hours">00</p>
                    <span>Hours</span>
                </div>
                <div class="time-box">
                    <p id="minutes">00</p>
                    <span>Minutes</span>
                </div>
                <div class="time-box">
                    <p id="seconds">00</p>
                    <span>Seconds</span>
                </div>
            </div>

            <button type="button">Learn More <img src="images/triangle.png" alt="arrow"></button>
        </div>

        <img src="images/rocket.png" class="rocket" alt="Rocket">
    </div>

    <script src="script.js"></script>
</body>

</html>
