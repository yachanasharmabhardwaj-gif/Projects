<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Quiz Favicon.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="screen active" id="start-screen">
            <h1>Quiz Time</h1>
            <p>Test Your knowledge with these fun questions</p>
            <button class="start-btn" id="start-btn">Start Quiz</button>
        </div>

        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">question goes here</h2>
                <div class="quiz-info">
                    <p>Question <span id="current-Q">1</span> of <span id="total-Q"></span></p>
                    <p>score:<span id="score">0</span></p>
                </div>
            </div>

            <div class="ans-container" id="ans-container"></div>

            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h1>Quiz result</h1>
            <div class="result-info">
                <p>You scored <span id="final-score">0</span> out of <span id="maximum-score"></span></p>
                <div class="result-message" id="result-message">Good Job</div>
            </div>
            <button class="restart-btn" id="restart-btn">Restart Quiz</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
