<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Editor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="html.png" type="image/x-icon">
</head>
<body>
    <div class="code-editor-container">
        <div class="code-editor html-editor">
            <div class="head-editor">
                <div class="left-head">
                    <img src="html.png" alt="html.png" width="22px">
                    <span>HTML</span>
                </div>
                <div class="right-head">
                    <img src="copy.svg" alt="copy.svg" class="copy copy1">
                </div>
            </div>
            <textarea class="html-input" spellcheck="false"></textarea>
        </div>
        <div class="code-editor css-editor">
            <div class="head-editor">
                <div class="left-head">
                    <img src="css.png" alt="css.png" width="27px">
                    <span>CSS</span>
                </div>
                <div class="right-head">
                    <img src="copy.svg" alt="copy.svg" class="copy copy2">
                </div>
            </div>
            <textarea class="css-input" spellcheck="false"></textarea>
        </div>
        <div class="code-editor js-editor">
            <div class="head-editor">
                <div class="left-head">
                    <img src="js.png" alt="js.png" width="26px">
                    <span>JS</span>
                </div>
                <div class="right-head">
                    <img src="copy.svg" alt="copy.svg" class="copy copy3">
                </div>
            </div>
            <textarea class="js-input" spellcheck="false"></textarea>
        </div>
    </div>

    <div class="output-container">
        <div class="output-head">
            <div class="img-container">
                <img src="html.png" alt="html.png" width="29px">
                <img src="css.png" alt="css.png" width="32px">
                <img src="js.png" alt="js.png" width="31px">
            </div>
                <span>OUTPUT</span>
                <img src="save.svg" alt="save.svg" id="save">
                <img src="full.svg" alt="full.svg" id="full">
        </div>
        <iframe id="output"></iframe>
    </div>
    <script src="script.js"></script>
</body>
</html>
